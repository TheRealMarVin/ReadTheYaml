service_name:
  type: str
  description: Human-readable service name

port:
  type: int
  description: Service port
  required: false
  default: 8080
  value_range: [1, 65535]

mode:
  type: enum
  description: Runtime mode
  required: false
  default: dev
  values: [dev, stage, prod]

compile:
  required: false
  when:
    field: mode
    op: in
    value: [stage, prod]
  command:
    type: str
    description: Build command for non-dev environments
    required: true
